<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220" role="img" aria-labelledby="title desc">
  <title id="title">ApexTest End-to-End Architecture</title>
  <desc id="desc">Architecture diagram for ApexTest showing the React frontend, FastAPI backend, configurable RAG ingestion, Chroma vector database, Jira retrieval, LangGraph quality gate, specialist agents, and export flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061026"/>
      <stop offset="55%" stop-color="#0b1326"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5de6ff"/>
      <stop offset="100%" stop-color="#8083ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#171f33" stop-opacity="0.86"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5de6ff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c0c1ff"/>
    </marker>
    <style>
      .title { font: 800 44px Inter, Arial, sans-serif; fill: #e1e0ff; letter-spacing: 0; }
      .subtitle { font: 500 20px Inter, Arial, sans-serif; fill: #c7c4d7; }
      .section-title { font: 800 16px Inter, Arial, sans-serif; fill: #5de6ff; letter-spacing: 2px; text-transform: uppercase; }
      .h { font: 800 22px Inter, Arial, sans-serif; fill: #dae2fd; }
      .body { font: 500 15px Inter, Arial, sans-serif; fill: #c7c4d7; }
      .small { font: 700 13px "JetBrains Mono", Consolas, monospace; fill: #9fdff0; }
      .tiny { font: 600 12px Inter, Arial, sans-serif; fill: #b9bfd7; }
      .pill { font: 800 12px Inter, Arial, sans-serif; fill: #061329; letter-spacing: 1px; }
      .box { fill: url(#panel); stroke: rgba(255,255,255,0.14); stroke-width: 1.5; filter: url(#shadow); }
      .box-strong { fill: rgba(13, 21, 42, 0.96); stroke: #5de6ff; stroke-width: 2; filter: url(#shadow); }
      .lane { fill: rgba(255,255,255,0.025); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .line { fill: none; stroke: #5de6ff; stroke-width: 2.4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #c0c1ff; stroke-width: 2.1; marker-end: url(#arrowPurple); stroke-dasharray: 7 7; }
      .line-soft { fill: none; stroke: rgba(93,230,255,0.55); stroke-width: 1.8; marker-end: url(#arrow); }
      .badge { fill: url(#cyan); filter: url(#glow); }
      .chip { fill: rgba(93,230,255,0.11); stroke: rgba(93,230,255,0.35); stroke-width: 1; }
      .danger { fill: rgba(255,180,171,0.12); stroke: rgba(255,180,171,0.42); stroke-width: 1.5; }
      .success { fill: rgba(93,230,255,0.12); stroke: rgba(93,230,255,0.42); stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1800" height="1220" fill="url(#bg)"/>
  <circle cx="350" cy="90" r="260" fill="#8083ff" opacity="0.10"/>
  <circle cx="1450" cy="1040" r="300" fill="#5de6ff" opacity="0.08"/>

  <text x="70" y="76" class="title">ApexTest Architecture</text>
  <text x="70" y="112" class="subtitle">Configurable RAG knowledge base + Requirement Quality Gate + LangGraph specialist QA agents</text>

  <!-- Lanes -->
  <rect x="52" y="155" width="410" height="960" rx="26" class="lane"/>
  <rect x="492" y="155" width="420" height="960" rx="26" class="lane"/>
  <rect x="942" y="155" width="385" height="960" rx="26" class="lane"/>
  <rect x="1357" y="155" width="390" height="960" rx="26" class="lane"/>

  <text x="82" y="195" class="section-title">Frontend: React Command Center</text>
  <text x="522" y="195" class="section-title">Backend: FastAPI API Layer</text>
  <text x="972" y="195" class="section-title">Knowledge &amp; Integrations</text>
  <text x="1387" y="195" class="section-title">LangGraph QA Workflow</text>

  <!-- Frontend boxes -->
  <rect x="82" y="230" width="340" height="126" rx="18" class="box"/>
  <circle cx="120" cy="270" r="19" class="badge"/>
  <text x="112" y="277" class="pill">1</text>
  <text x="154" y="265" class="h">ApexTest UI</text>
  <text x="154" y="294" class="body">Prompt input, test-type chips,</text>
  <text x="154" y="318" class="body">metrics, collapsible test cards</text>
  <text x="154" y="340" class="small">frontend/src/main.jsx</text>

  <rect x="82" y="390" width="340" height="166" rx="18" class="box-strong"/>
  <circle cx="120" cy="430" r="19" class="badge"/>
  <text x="112" y="437" class="pill">2</text>
  <text x="154" y="425" class="h">Knowledge Base Panel</text>
  <text x="154" y="456" class="body">Upload .txt, .md, .docx, .pdf</text>
  <text x="154" y="480" class="body">List active documents and chunks</text>
  <text x="154" y="504" class="body">Delete docs from UI and Vector DB</text>
  <text x="154" y="532" class="small">POST /api/rag/documents</text>

  <rect x="82" y="590" width="340" height="144" rx="18" class="box"/>
  <circle cx="120" cy="630" r="19" class="badge"/>
  <text x="112" y="637" class="pill">3</text>
  <text x="154" y="626" class="h">Generate Request</text>
  <text x="154" y="656" class="body">Sends user query and selected</text>
  <text x="154" y="680" class="body">specialist agent types</text>
  <text x="154" y="710" class="small">POST /api/generate</text>

  <rect x="82" y="768" width="340" height="172" rx="18" class="box"/>
  <text x="112" y="810" class="h">Result Views</text>
  <text x="112" y="842" class="body">Requirement quality gate panel</text>
  <text x="112" y="866" class="body">Traceability matrix cards</text>
  <text x="112" y="890" class="body">Coverage summary cards</text>
  <text x="112" y="914" class="body">Generated test case cards</text>

  <!-- Backend boxes -->
  <rect x="522" y="230" width="350" height="132" rx="18" class="box"/>
  <text x="552" y="269" class="h">FastAPI Gateway</text>
  <text x="552" y="300" class="body">CORS, request validation,</text>
  <text x="552" y="324" class="body">upload endpoints, Excel export</text>
  <text x="552" y="347" class="small">api.py</text>

  <rect x="522" y="398" width="350" height="166" rx="18" class="box-strong"/>
  <text x="552" y="438" class="h">RAG Document Service</text>
  <text x="552" y="469" class="body">Extract text from uploads</text>
  <text x="552" y="493" class="body">Chunk content and write manifest</text>
  <text x="552" y="517" class="body">Delete by stable document_id</text>
  <text x="552" y="545" class="small">services/rag_document_service.py</text>

  <rect x="522" y="600" width="350" height="144" rx="18" class="box"/>
  <text x="552" y="640" class="h">Shared App Core</text>
  <text x="552" y="671" class="body">Seeds Chroma if needed and builds</text>
  <text x="552" y="695" class="body">the compiled LangGraph once</text>
  <text x="552" y="724" class="small">app_core.py</text>

  <rect x="522" y="780" width="350" height="160" rx="18" class="box"/>
  <text x="552" y="820" class="h">Response Normalizer</text>
  <text x="552" y="851" class="body">Flattens specialist outputs</text>
  <text x="552" y="875" class="body">Extracts traceability and coverage</text>
  <text x="552" y="899" class="body">Surfaces quality-gate status</text>
  <text x="552" y="926" class="small">services/response_normalizer.py</text>

  <!-- Knowledge boxes -->
  <rect x="972" y="230" width="315" height="154" rx="18" class="box-strong"/>
  <text x="1002" y="270" class="h">Chroma Vector DB</text>
  <text x="1002" y="301" class="body">Persistent local embeddings</text>
  <text x="1002" y="325" class="body">Static seed docs + uploaded docs</text>
  <text x="1002" y="349" class="body">Metadata enables source-aware delete</text>
  <text x="1002" y="374" class="small">chroma_db/</text>

  <rect x="972" y="420" width="315" height="148" rx="18" class="box"/>
  <text x="1002" y="460" class="h">Document Metadata</text>
  <text x="1002" y="491" class="body">Manifest tracks filename, path,</text>
  <text x="1002" y="515" class="body">chunk count, created_at, status</text>
  <text x="1002" y="544" class="small">uploads/rag_documents/</text>

  <rect x="972" y="604" width="315" height="148" rx="18" class="box"/>
  <text x="1002" y="644" class="h">JIRA MCP / REST</text>
  <text x="1002" y="675" class="body">Reads JIRA story details,</text>
  <text x="1002" y="699" class="body">description, status, priority,</text>
  <text x="1002" y="723" class="body">acceptance criteria</text>

  <rect x="972" y="788" width="315" height="152" rx="18" class="box"/>
  <text x="1002" y="828" class="h">Retrieved RAG Context</text>
  <text x="1002" y="859" class="body">Uploaded docs are preferred</text>
  <text x="1002" y="883" class="body">Static seed docs are fallback</text>
  <text x="1002" y="907" class="body">Source filenames flow to response</text>

  <!-- LangGraph boxes -->
  <rect x="1387" y="230" width="320" height="106" rx="18" class="box"/>
  <text x="1417" y="270" class="h">Input Guardrail</text>
  <text x="1417" y="301" class="body">Rejects unsafe/off-topic requests</text>

  <rect x="1387" y="368" width="320" height="106" rx="18" class="box"/>
  <text x="1417" y="408" class="h">Reformulator + Orchestrator</text>
  <text x="1417" y="439" class="body">Extracts JIRA key and test types</text>

  <rect x="1387" y="506" width="320" height="126" rx="18" class="box"/>
  <text x="1417" y="546" class="h">JIRA + RAG Subgraphs</text>
  <text x="1417" y="577" class="body">Fetch story, retrieve knowledge,</text>
  <text x="1417" y="601" class="body">score relevance and summarize context</text>

  <rect x="1387" y="664" width="320" height="158" rx="18" class="danger"/>
  <text x="1417" y="704" class="h">Requirement Quality Gate Agent</text>
  <text x="1417" y="735" class="body">Checks completeness of story,</text>
  <text x="1417" y="759" class="body">business rules, acceptance criteria,</text>
  <text x="1417" y="783" class="body">roles, validation and boundaries</text>
  <text x="1417" y="809" class="small">Pass or ask PO/BA questions</text>

  <rect x="1387" y="854" width="320" height="154" rx="18" class="success"/>
  <text x="1417" y="894" class="h">Specialist Test Agents</text>
  <text x="1417" y="925" class="body">Functional, Negative, Boundary,</text>
  <text x="1417" y="949" class="body">API, UI/UX, Regression</text>
  <text x="1417" y="975" class="small">Skipped if gate fails</text>

  <rect x="1387" y="1040" width="320" height="106" rx="18" class="box"/>
  <text x="1417" y="1080" class="h">Aggregator + Tone + Output Guard</text>
  <text x="1417" y="1111" class="body">Builds final pack, cards, export data</text>

  <!-- Main flow arrows -->
  <path d="M422 292 C470 292 472 292 522 292" class="line"/>
  <path d="M422 474 C472 474 472 474 522 474" class="line"/>
  <path d="M872 480 C918 480 920 306 972 306" class="line"/>
  <path d="M872 480 C920 480 920 494 972 494" class="line-soft"/>
  <path d="M422 662 C470 662 472 662 522 662" class="line"/>
  <path d="M872 662 C1030 662 1228 564 1387 564" class="line"/>
  <path d="M1287 678 C1328 678 1344 568 1387 568" class="line-soft"/>
  <path d="M1287 864 C1330 864 1344 744 1387 744" class="line-soft"/>
  <path d="M1547 336 L1547 368" class="line-soft"/>
  <path d="M1547 474 L1547 506" class="line-soft"/>
  <path d="M1547 632 L1547 664" class="line-soft"/>
  <path d="M1547 822 L1547 854" class="line"/>
  <path d="M1547 1008 L1547 1040" class="line"/>
  <path d="M1387 1094 C1160 1094 1100 860 872 860" class="line-muted"/>
  <path d="M522 860 C462 860 456 854 422 854" class="line-muted"/>

  <!-- Gate branches -->
  <path d="M1707 742 C1752 742 1752 840 1707 902" class="line"/>
  <text x="1660" y="848" class="small">PASS</text>
  <path d="M1387 744 C1338 744 1338 1038 1387 1092" class="line-muted"/>
  <text x="1300" y="926" class="small">NEEDS CLARIFICATION</text>

  <!-- Upload/delete detail chips -->
  <rect x="1002" y="1030" width="255" height="84" rx="14" class="chip"/>
  <text x="1024" y="1062" class="small">Vector delete key</text>
  <text x="1024" y="1090" class="body">where document_id == uploaded id</text>

  <rect x="82" y="976" width="340" height="96" rx="18" class="box"/>
  <text x="112" y="1016" class="h">Excel Export</text>
  <text x="112" y="1047" class="body">Test cases, traceability, coverage, summary</text>
  <text x="112" y="1069" class="small">POST /api/export/excel</text>

  <path d="M522 860 C448 914 448 1024 422 1024" class="line-muted"/>

  <!-- Footer legend -->
  <rect x="70" y="1152" width="1660" height="42" rx="14" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.10)"/>
  <circle cx="102" cy="1173" r="7" fill="#5de6ff"/>
  <text x="120" y="1178" class="tiny">Solid cyan arrows: primary runtime flow</text>
  <circle cx="402" cy="1173" r="7" fill="#c0c1ff"/>
  <text x="420" y="1178" class="tiny">Dashed lavender arrows: response/export return paths</text>
  <circle cx="802" cy="1173" r="7" fill="#ffb4ab"/>
  <text x="820" y="1178" class="tiny">Quality gate can pause generation and return PO/BA clarifying questions</text>
  <circle cx="1320" cy="1173" r="7" fill="#80f1ff"/>
  <text x="1338" y="1178" class="tiny">Uploaded docs are preferred; static seed data remains fallback</text>
</svg>
